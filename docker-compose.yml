services:
  postgres:
    image: postgres
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: ${DB_NAME:-test}
      PG_DATA: /data/postgres
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - postgres

networks:
  postgres:
    driver: bridge
